name: Update Repo Activity

on:
  schedule:
    - cron: '13 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Update README activity block
        env:
          GH_ACTIVITY_TOKEN: ${{ secrets.GH_ACTIVITY_TOKEN }}
          GH_USERNAME: lsyurea
          ACTIVE_DAYS: ${{ vars.ACTIVE_DAYS || '90' }}
          README_PATH: README.md
        run: node scripts/update-repo-activity.mjs

      - name: Commit and push changes
        env:
          COMMIT_AUTHOR_NAME: ${{ vars.COMMIT_AUTHOR_NAME || 'lsyurea' }}
          COMMIT_AUTHOR_EMAIL: ${{ vars.COMMIT_AUTHOR_EMAIL || 'lsyurea@users.noreply.github.com' }}
        run: |
          if git diff --quiet README.md; then
            echo "No changes to commit"
            exit 0
          fi

          git config user.name "$COMMIT_AUTHOR_NAME"
          git config user.email "$COMMIT_AUTHOR_EMAIL"
          git add README.md
          git commit -m "chore: update repository activity"
          git push
